events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /dev/stdout main;
  access_log /var/log/nginx/access.log main;
  error_log /dev/stderr warn;
  error_log /var/log/nginx/error.log warn;

  upstream nextjs_backend {
    server web:3000 max_fails=2 fail_timeout=10s;
    server web-replica:3000 max_fails=2 fail_timeout=10s;
    keepalive 16;
  }

  upstream waline {
    server waline:8360;
  }

  server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    location = /waline {
      return 308 /waline/;
    }

    location ^~ /ui/ {
      return 308 /waline$request_uri;
    }

    location = /waline/api/oauth {
      proxy_pass http://waline/api/oauth;
      proxy_http_version 1.1;
      proxy_intercept_errors on;
      error_page 400 401 403 404 500 502 503 504 /oauth-error.html;
      proxy_redirect ~^/ui/(.*)$ /waline/ui/$1;
      proxy_set_header Host $host;
      proxy_set_header Referer "$scheme://$host/";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 120s;
    }

    location /waline/ {
      proxy_pass http://waline/;
      proxy_http_version 1.1;
      proxy_set_header Accept-Encoding "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 120s;
      sub_filter_once on;
      sub_filter '</head>' '<style>.profile-avatar-btn{cursor:pointer}.profile-avatar-btn::after{content:"修改头像";display:block;margin-top:8px;color:#1677ff;font-size:14px;font-weight:700;line-height:1.4}</style></head>';
    }

    location = /oauth-error.html {
      root /usr/share/nginx/html/errors;
      internal;
    }

    location = /service-error.html {
      root /usr/share/nginx/html/errors;
      internal;
    }

    location /error-assets/ {
      alias /usr/share/nginx/html/errors/;
    }

    location ^~ /api/admin/ops {
      proxy_pass http://nextjs_backend;
      proxy_http_version 1.1;
      proxy_intercept_errors off;
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 2;
      proxy_connect_timeout 2s;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 120s;
    }

    location / {
      proxy_pass http://nextjs_backend;
      proxy_http_version 1.1;
      proxy_intercept_errors on;
      error_page 500 502 503 504 /service-error.html;
      proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
      proxy_next_upstream_tries 2;
      proxy_connect_timeout 2s;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 120s;
    }
  }
}
