x-web-environment: &web-environment
  NODE_ENV: production
  HOSTNAME: 0.0.0.0
  NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
  NEXT_PUBLIC_WALINE_SERVER_URL: ${NEXT_PUBLIC_WALINE_SERVER_URL:-/waline}
  NEXT_PUBLIC_UPTIME_STATUS_URL: ${NEXT_PUBLIC_UPTIME_STATUS_URL:-}
  ADMIN_TOKEN: ${ADMIN_TOKEN:-}
  OPS_ALLOW_INSECURE_HTTP: ${OPS_ALLOW_INSECURE_HTTP:-false}
  OPS_DATA_DIR: /app/runtime/ops
  OPS_USE_MOCK_DATA: "false"
  GOACCESS_REPORT_PATH: /app/runtime/goaccess/report.html

x-web-common: &web-common
  image: coordinate-zero-web:latest
  restart: unless-stopped
  environment:
    <<: *web-environment
  volumes:
    - ./runtime/ops:/app/runtime/ops:ro
    - ./runtime/goaccess:/app/runtime/goaccess:ro
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
      ]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 20s
  networks:
    - coordinate-zero

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      web-replica:
        condition: service_healthy
      waline:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/errors:/usr/share/nginx/html/errors:ro
      - ./runtime/nginx:/var/log/nginx
    networks:
      - coordinate-zero

  web:
    <<: *web-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_WALINE_SERVER_URL: ${NEXT_PUBLIC_WALINE_SERVER_URL:-/waline}
        NEXT_PUBLIC_UPTIME_STATUS_URL: ${NEXT_PUBLIC_UPTIME_STATUS_URL:-}
    environment:
      <<: *web-environment
      WEB_REPLICA_ID: web-primary

  web-replica:
    <<: *web-common
    environment:
      <<: *web-environment
      WEB_REPLICA_ID: web-replica

  waline:
    image: lizheming/waline:1.40.3
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SITE_NAME: ${SITE_NAME:-Coordinate Zero}
      SITE_URL: ${SITE_URL}
      SERVER_URL: ${SITE_URL}/waline
      SECURE_DOMAINS: ${SECURE_DOMAINS}
      AUTHOR_EMAIL: ${AUTHOR_EMAIL}
      JWT_TOKEN: ${JWT_TOKEN}
      LOGIN: force
      MYSQL_DB: ${MYSQL_DATABASE:-waline}
      MYSQL_USER: ${MYSQL_USER:-waline}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_CHARSET: utf8mb4
      IPQPS: ${IPQPS:-60}
      COMMENT_AUDIT: ${COMMENT_AUDIT:-false}
      DISABLE_REGION: ${DISABLE_REGION:-true}
      DISABLE_USERAGENT: ${DISABLE_USERAGENT:-false}
    networks:
      - coordinate-zero

  mysql:
    image: mysql:8.0.43
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-waline}
      MYSQL_USER: ${MYSQL_USER:-waline}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/waline.sql:/docker-entrypoint-initdb.d/01-waline.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - coordinate-zero

  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0-slim
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - coordinate-zero

  goaccess:
    image: allinurl/goaccess:1.10.2
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "trap 'exit 0' TERM INT; while :; do sleep 3600 & wait $$!; done"
    environment:
      LANG: C
    volumes:
      - ./runtime/nginx:/var/log/nginx:ro
      - ./runtime/goaccess:/var/www/goaccess
    networks:
      - coordinate-zero

volumes:
  mysql-data:
  uptime-kuma-data:

networks:
  coordinate-zero:
    driver: bridge
